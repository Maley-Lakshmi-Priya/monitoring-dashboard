<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="5G Network Monitoring Dashboard - Real-time monitoring of Core Network, Radio Access Network, Subscribers, and Alerts">
    <title>5G Monitoring Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/styles/index.css">
    <link rel="stylesheet" href="src/styles/components.css">
    <link rel="stylesheet" href="src/styles/dashboard.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <circle cx="14" cy="14" r="12" stroke="url(#grad1)" stroke-width="2.5"/>
                            <circle cx="14" cy="14" r="7" stroke="url(#grad1)" stroke-width="2" opacity="0.7"/>
                            <circle cx="14" cy="14" r="3" fill="url(#grad1)"/>
                            <defs><linearGradient id="grad1" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#00d4ff"/><stop offset="1" stop-color="#7b2ff7"/></linearGradient></defs>
                        </svg>
                    </div>
                    <span class="logo-text">5G Monitor</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="core-network" id="nav-core-network">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                    <span>Core Network</span>
                </a>
                <a href="#" class="nav-item" data-page="radio-access" id="nav-radio-access">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10"/><path d="M5 12c0-3.87 3.13-7 7-7s7 3.13 7 7"/><path d="M8 12a4 4 0 018 0"/><circle cx="12" cy="12" r="1"/><line x1="12" y1="12" x2="12" y2="20"/></svg>
                    <span>Radio Access</span>
                </a>
                <a href="#" class="nav-item" data-page="subscribers" id="nav-subscribers">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    <span>Subscribers</span>
                </a>
                <a href="#" class="nav-item" data-page="alerts" id="nav-alerts">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/><circle cx="18" cy="4" r="3" fill="#ff4757" stroke="none"/></svg>
                    <span>Alerts</span>
                    <span class="badge" id="alert-count">3</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="network-status">
                    <span class="status-dot online"></span>
                    <span>Network Online</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header" id="header">
                <div class="header-left">
                    <button class="menu-toggle" id="menu-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="page-title" id="page-title">Dashboard</h1>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="Search nodes, metrics..." id="search-input">
                    </div>
                    <div class="header-time" id="header-time"></div>
                    <div class="header-refresh">
                        <button class="btn-icon" id="refresh-btn" title="Refresh Data">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Page Content Container -->
            <div class="page-container" id="page-container">
                <!-- Pages will be rendered here by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="src/utils/constants.js"></script>
    <script src="src/utils/formatters.js"></script>
    <script src="src/data/topology.js"></script>
    <script src="src/data/metrics.js"></script>
    <script src="src/data/subscribers.js"></script>
    <script src="src/components/MetricsCard.js"></script>
    <script src="src/components/StatusBadge.js"></script>
    <script src="src/components/Chart.js"></script>
    <script src="src/components/NetworkTopology.js"></script>
    <script src="src/pages/Dashboard.js"></script>
    <script src="src/pages/CoreNetwork.js"></script>
    <script src="src/pages/RadioAccess.js"></script>
    <script src="src/pages/Subscribers.js"></script>
    <script src="src/pages/Alerts.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
